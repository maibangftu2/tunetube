<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Request | TuneTube</title>
    <meta name="description" content="Get in touch with TuneTube. Submit your music or brand partnership request.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="submit-page">
    <!-- Header -->
    <header class="header" id="header">
        <div class="header-inner">
            <a href="index.html" class="logo" id="logo">
                <div class="logo-text">
                    <span class="logo-tune">TUNE</span>
                    <span class="logo-tube">TUBE</span>
                </div>
            </a>
            <nav class="nav" id="nav">
                <a href="for-labels.html" class="nav-link" id="nav-labels">For Labels</a>
                <a href="index.html" class="nav-link" id="nav-creators">For Brands</a>
            </nav>
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- Mobile Nav -->
    <div class="mobile-nav" id="mobile-nav">
        <a href="for-labels.html" class="mobile-nav-link">For Labels</a>
        <a href="index.html" class="mobile-nav-link">For Brands</a>
    </div>

    <!-- Submit Request Section -->
    <section class="submit-section" id="submit-section">
        <div class="submit-bg">
            <img src="images/submit-bg.png" alt="Concert stage with red lighting" class="submit-bg-img">
            <div class="submit-overlay"></div>
        </div>
        <div class="submit-form-wrapper" id="form-container">
            <h1 class="submit-title" id="form-title">Submit a Request</h1>
            <p class="submit-subtitle" id="form-subtitle">Tell us about your project and we'll find the perfect solution.</p>
            
            <form class="contact-form" id="contact-form" action="https://formspree.io/f/mvzvrgzl" method="POST">
                <!-- Formspree hidden config -->
                <input type="hidden" name="_subject" value="New TuneTube Inquiry">
                <input type="hidden" name="_next" value="https://tunetube.org/submit-request.html?sent=true">
                <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

                <div class="form-row">
                    <div class="form-group">
                        <label for="first-name">First Name *</label>
                        <input type="text" id="first-name" name="firstName" required placeholder="John">
                    </div>
                    <div class="form-group">
                        <label for="last-name">Last Name *</label>
                        <input type="text" id="last-name" name="lastName" required placeholder="Doe">
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="company">Company / Label</label>
                    <input type="text" id="company" name="company" placeholder="Your company or label name">
                </div>
                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" required rows="5" placeholder="Tell us about your project, goals, and what you're looking for..."></textarea>
                </div>
                <button type="submit" class="btn-submit" id="btn-submit">Submit</button>
            </form>

            <!-- Success message (shown after redirect) -->
            <div class="form-success" id="form-success" style="display:none;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#7B42BC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                <h2>Thank you!</h2>
                <p>Your request has been submitted successfully. We'll get back to you soon.</p>
                <a href="index.html" class="btn-submit" style="display:inline-block;text-decoration:none;margin-top:20px;">Back to Home</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer footer-dark" id="footer">
        <div class="footer-inner">
            <div class="footer-logo">
                <span class="footer-tune">TUNE</span>
                <span class="footer-tube">TUBE</span>
            </div>
            <p class="footer-copyright" id="footer-copyright">© 2026 by TuneTube Inc.</p>
        </div>
    </footer>

    <script src="cms.js"></script>
    <script src="script.js"></script>
    <script>
        // Show success message if redirected from Formspree
        if (window.location.search.includes('sent=true')) {
            const form = document.getElementById('contact-form');
            const success = document.getElementById('form-success');
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            if (form) form.style.display = 'none';
            if (success) success.style.display = 'block';
            if (title) title.style.display = 'none';
            if (subtitle) subtitle.style.display = 'none';
        }
    </script>
</html>
